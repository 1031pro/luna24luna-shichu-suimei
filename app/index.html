<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>四柱推命 命式ツール</title>
    <meta name="theme-color" content="#d9a21b" />
    <meta name="robots" content="noindex, nofollow, noarchive, nosnippet" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="命式ツール" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <link rel="icon" type="image/png" href="./icons/icon-192.png" />
    <link rel="apple-touch-icon" href="./icons/apple-touch-icon.png" />
    <link rel="manifest" href="./manifest.webmanifest" />
    <link rel="stylesheet" href="./styles/app.css" />
  </head>
  <body>
    <main class="app-shell">
      <section class="input-panel" aria-label="命式入力">
        <div class="brand-block">
          <img class="brand-icon" src="./icons/icon-512.png" alt="四柱推命" />
        </div>

        <form id="birth-form" class="birth-form">
          <fieldset class="mode-picker">
            <legend>利用する機能</legend>
            <div class="segmented">
              <label><input type="radio" name="mode" value="chart" checked /><span>命式鑑定</span></label>
              <label><input type="radio" name="mode" value="compatibility" /><span>相性診断</span></label>
            </div>
          </fieldset>

          <label class="report-name-field">
            <span>お名前</span>
            <input id="customer-name" name="customerName" type="text" autocomplete="name" placeholder="未入力可" />
            <small>鑑定書出力時に利用</small>
          </label>

          <fieldset>
            <legend>あなたの生年月日</legend>
            <div class="date-grid">
              <label>
                <span>年</span>
                <select id="birth-year" name="birthYear" required>
                  <option value="1990" selected>1990</option>
                </select>
              </label>
              <label>
                <span>月</span>
                <select id="birth-month" name="birthMonth" required>
                  <option value="1" selected>1</option>
                </select>
              </label>
              <label>
                <span>日</span>
                <select id="birth-day" name="birthDay" required>
                  <option value="1" selected>1</option>
                </select>
              </label>
            </div>
          </fieldset>

          <fieldset>
            <legend>あなたの出生時刻</legend>
            <div class="time-row">
              <label>
                <span>時</span>
                <select id="birth-hour" name="birthHour">
                  <option value="12" selected>12</option>
                </select>
              </label>
              <label>
                <span>分</span>
                <select id="birth-minute" name="birthMinute">
                  <option value="0" selected>0</option>
                </select>
              </label>
              <label class="check-row">
                <input id="unknown-time" name="unknownTime" type="checkbox" checked />
                <span>時刻不明</span>
              </label>
            </div>
          </fieldset>

          <fieldset>
            <legend>あなたの性別</legend>
            <div class="segmented">
              <label>
                <input type="radio" name="sex" value="male" checked />
                <span>男性</span>
              </label>
              <label>
                <input type="radio" name="sex" value="female" />
                <span>女性</span>
              </label>
            </div>
          </fieldset>

          <label class="current-year chart-only">
            <span>年運の基準年</span>
            <input id="current-year" name="currentYear" type="number" min="1900" max="2200" value="2026" />
          </label>

          <fieldset class="chart-only">
            <legend>月運・日運</legend>
            <div class="date-grid luck-date-grid">
              <label>
                <span>月運 開始年</span>
                <select id="monthly-luck-year" name="monthlyLuckYear">
                  <option value="2026" selected>2026</option>
                </select>
              </label>
              <label>
                <span>月運 開始月</span>
                <select id="monthly-luck-month" name="monthlyLuckMonth">
                  <option value="7" selected>7</option>
                </select>
              </label>
              <label>
                <span>日運 年</span>
                <select id="daily-luck-year" name="dailyLuckYear">
                  <option value="2026" selected>2026</option>
                </select>
              </label>
              <label>
                <span>日運 月</span>
                <select id="daily-luck-month" name="dailyLuckMonth">
                  <option value="7" selected>7</option>
                </select>
              </label>
            </div>
          </fieldset>

          <fieldset id="partner-birth-field" class="partner-birth-field" hidden>
            <legend>お相手の生年月日</legend>
            <label class="report-name-field">
              <span>お相手のお名前</span>
              <input id="partner-name" name="partnerName" type="text" autocomplete="name" placeholder="未入力可" />
            </label>
            <div class="date-grid">
              <label>
                <span>年</span>
                <select id="partner-year" name="partnerYear" required></select>
              </label>
              <label>
                <span>月</span>
                <select id="partner-month" name="partnerMonth" required></select>
              </label>
              <label>
                <span>日</span>
                <select id="partner-day" name="partnerDay" required></select>
              </label>
            </div>
            <fieldset>
              <legend>お相手の性別</legend>
              <div class="segmented">
                <label>
                  <input type="radio" name="partnerSex" value="male" checked />
                  <span>男性</span>
                </label>
                <label>
                  <input type="radio" name="partnerSex" value="female" />
                  <span>女性</span>
                </label>
              </div>
            </fieldset>
            <fieldset class="partner-time-field">
              <legend>お相手の出生時刻</legend>
              <div class="time-row">
                <label>
                  <span>時</span>
                  <select id="partner-hour" name="partnerHour"></select>
                </label>
                <label>
                  <span>分</span>
                  <select id="partner-minute" name="partnerMinute"></select>
                </label>
                <label class="check-row">
                  <input id="partner-unknown-time" name="partnerUnknownTime" type="checkbox" checked />
                  <span>時刻不明</span>
                </label>
              </div>
            </fieldset>
          </fieldset>

          <button id="submit-button" type="submit">命式を表示</button>
        </form>
      </section>

      <section id="results" class="results-panel" aria-live="polite" hidden>
        <div class="empty-state">
          <h2>入力すると結果が表示されます</h2>
          <p>ライトプランの標準仕様として、命式、大運、年運、五行バランスを表示します。</p>
        </div>
      </section>
    </main>

    <script type="module" src="./src/deploy-guard.js"></script>
    <script type="module" src="./src/main.js"></script>
  </body>
</html>
